<!-- JS -->
<script>
const db = window.db;
const auth = window.auth;

console.log("DB =", db);
console.log("AUTH =", auth);
let isAdmin = false;

auth.onAuthStateChanged(user => {
    if(user){
        db.ref("users/" + user.uid).once("value").then(snap => {
            let data = snap.val();

            if(data && data.role === "Admin"){
                isAdmin = true;
            }

            console.log("isAdmin =", isAdmin); // debug

            loadMovies(); // luôn load
        });
    } else {
        alert("Chưa đăng nhập!");
        window.location.href = "login.html";
    }
});

// PREVIEW
function previewImg(){
    let url = document.getElementById("img").value;
    document.getElementById("preview").src = url || "https://via.placeholder.com/120x160";
}

// ADD
function addMovie(){

    if(!isAdmin){
        alert("Bạn không có quyền!");
        return;
    }

    let name = document.getElementById("name").value;
    let year = document.getElementById("year").value;
    let type = document.getElementById("type").value;
    let actor = document.getElementById("actor").value;
    let desc = document.getElementById("desc").value;
    let img = document.getElementById("img").value;

    if(!name || !year){
        alert("Nhập thiếu 😅");
        return;
    }

    db.ref("movies").push({
        name,
        year,
        genre: type,
        actor,
        desc,
        image: img
    })
    .then(()=> alert("Đã thêm phim 🎬"));
}

// LOAD
function loadMovies(){
    db.ref("movies").on("value", snapshot=>{
        let data = snapshot.val();
        let html = "";

        if(data){
            for(let id in data){
                let m = data[id];

                html += `
                <div class="d-flex align-items-center bg-white p-2 mb-2 shadow-sm rounded">
                    <img src="${m.image || 'https://via.placeholder.com/60'}"
                         style="width:60px;height:80px;object-fit:cover;border-radius:6px;">

                    <div class="ml-3">
                        <b>${m.name}</b> (${m.year})<br>
                        <small>${m.genre} | ${m.actor}</small>
                    </div>

                    <div class="ml-auto">
                        ${
                            isAdmin
                            ? `<button class="btn btn-danger btn-sm"
                                onclick="deleteMovie('${id}')">Xoá</button>`
                            : `<span class="text-muted">Chỉ xem</span>`
                        }
                    </div>
                </div>
                `;
            }
        }

        document.getElementById("movieList").innerHTML = html;
    });
}

// DELETE
function deleteMovie(id){

    if(!isAdmin){
        alert("Bạn không có quyền!");
        return;
    }

    if(confirm("Xoá phim này?")){
        db.ref("movies/" + id).remove();
    }
}
</script>

<script src="vendor/jquery/jquery.min.js"></script>
