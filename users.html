<html lang="vi">

<meta charset="UTF-8">

<script src="js/js/firebase-config.js"></script>
</head>

<body id="page-top">
<div id="wrapper">

<!-- SIDEBAR -->
<ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion">
<a class="sidebar-brand d-flex align-items-center justify-content-center" href="index.html">
    <div class="sidebar-brand-text mx-3">Movie Admin</div>
</a>

<hr class="sidebar-divider">

<li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
<li class="nav-item"><a class="nav-link" href="movies.html">Danh sách phim</a></li>
<li class="nav-item"><a class="nav-link" href="add-movie.html">Thêm phim</a></li>
<li class="nav-item"><a class="nav-link" href="schedule.html">Lịch chiếu</a></li>

<li class="nav-item active">
    <a class="nav-link" href="#">Người dùng</a>
</li>
</ul>

<!-- CONTENT -->
<div id="content-wrapper" class="d-flex flex-column">
<div id="content">

<nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 shadow">
    <h5 class="ml-3">Quản lý người dùng</h5>
</nav>

<div class="container-fluid">

<!-- FORM -->
<div class="card shadow mb-4">
<div class="card-header bg-success text-white">
Thêm người dùng
</div>

<div class="card-body">
<div class="row">

<div class="col-md-3">
<input id="name" class="form-control" placeholder="Tên">
</div>

<div class="col-md-3">
<input id="email" class="form-control" placeholder="Email">
</div>

<div class="col-md-3">
<select id="role" class="form-control">
<option value="User">User</option>
<option value="Admin">Admin</option>
</select>
</div>

<div class="col-md-3">
<button class="btn btn-success w-100" onclick="addUser()">
Thêm
</button>
</div>

</div>

<div id="msg" class="mt-3 text-success"></div>

</div>
</div>

<!-- TABLE -->
<div class="card shadow">
<div class="card-header bg-primary text-white">
Danh sách người dùng
</div>

<div class="card-body">

<table class="table table-bordered text-center">
<thead class="bg-primary text-white">
<tr>
<th>Tên</th>
<th>Email</th>
<th>Vai trò</th>
<th>Trạng thái</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="userList"></tbody>

</table>

</div>
</div>

</div>
</div>
</div>

</div>

<script>
const db = window.db;
const auth = window.auth;

console.log("DB =", db);
console.log("AUTH =", auth);
let currentUserData = null;
// VALIDATE EMAIL
function isEmail(email){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}
auth.onAuthStateChanged(user => {
    if (!user) {
        alert("Phải đăng nhập!");
        window.location.href = "login.html";
    } else {
        db.ref("users/" + user.uid).once("value").then(snap => {
            currentUserData = snap.val();

            if(currentUserData?.role !== "Admin"){
                alert("Không có quyền!");
                window.location.href = "index.html";
            } else {
                loadUsers(); // ✅ chỉ admin mới load
            }
        });
    }
});
// LOAD USER
function loadUsers(){
    db.ref("users").on("value", snapshot=>{
        let data = snapshot.val();
        let html = "";

        if(data){
            for(let id in data){
                let u = data[id];

                html += `
                <tr>
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td><span class="badge badge-info">${u.role}</span></td>
                    <td>
                        <span class="badge ${u.status === 'Hoạt động' ? 'badge-success':'badge-secondary'}">
                            ${u.status}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="toggleStatus('${id}','${u.status}')">
                            Đổi trạng thái
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="deleteUser('${id}')">
                            Xoá
                        </button>
                    </td>
                </tr>
                `;
            }
        }

        document.getElementById("userList").innerHTML = html;
    });
}

// ADD USER
function addUser(){

    // 🔥 CHECK ADMIN
    if(!currentUserData || currentUserData.role !== "Admin"){
        showMsg("Chỉ Admin mới được thêm!", "red");
        return;
    }

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let role = document.getElementById("role").value;

    if(!name || !email){
        showMsg("Vui lòng nhập đầy đủ thông tin", "red");
        return;
    }

    if(!isEmail(email)){
        showMsg("Email không hợp lệ", "red");
        return;
    }

    db.ref("users").push({
        name: name,
        email: email,
        role: role,
        status: "Hoạt động"
    });

    showMsg("Thêm người dùng thành công", "green");

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
}

// DELETE
function deleteUser(id){
    if(confirm("Xoá người dùng này?")){
        db.ref("users/" + id).remove();
    }
}

// TOGGLE STATUS
function toggleStatus(id, current){
    let newStatus = current === "Hoạt động" ? "Khoá" : "Hoạt động";

    db.ref("users/" + id).update({
        status: newStatus
    });
}

// MESSAGE
function showMsg(text, color){
    let msg = document.getElementById("msg");
    msg.innerText = text;
    msg.style.color = color;

    setTimeout(()=>{
        msg.innerText = "";
    },2000);
}

// INIT

</script>

</body>
</html>
