<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyB-tw2lNCrv2AXA5mUP4bkp9vzDpLzXqe4",
  authDomain: "movie-booking-87997.firebaseapp.com",
  databaseURL: "https://movie-booking-87997-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "movie-booking-87997",
  storageBucket: "movie-booking-87997.firebasestorage.app",
  messagingSenderId: "490389622658",
  appId: "1:490389622658:web:6f9da85f9330207e34099b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentUser = null;

firebase.auth().onAuthStateChanged(user => {
    if(user){
        currentUser = user;
        console.log("✅ Đã đăng nhập:", user.uid);
    }else{
        currentUser = null;
        console.log("❌ Chưa đăng nhập");
    }
});
// ===== BIẾN =====
let selected = [];
let bookedSeats = {}; 
let today = new Date().toISOString().split("T")[0];
let seatRef = null; 
// ===== LẤY PARAM =====
const params = new URLSearchParams(window.location.search);
const movieRaw = params.get("movie") || "Đặt vé";
const movie = decodeURIComponent(movieRaw).trim(); // 🔥 FIX FULL
let time = params.get("time") || "09:00";

// HIỂN THỊ
function updateTitle(){
    document.getElementById("movieName").innerText = " " + movie + " - " + time;
    document.getElementById("movieName2").innerText = movie + " (" + time + ")";
}

function render(){
    const box = document.getElementById("seatContainer");
    box.innerHTML = "";

    for(let i=1;i<=30;i++){
        let div = document.createElement("div");
        div.innerText = i;
        div.className = "seat";

        let vip = (i % 5 === 0);
        let booked = bookedSeats[i] || bookedSeats[i.toString()];
        if(booked){
            div.classList.add("booked");
        }else if(selected.includes(i)){
            div.classList.add("selected");
        }else if(vip){
            div.classList.add("vip");
        }else{
            div.classList.add("normal");
        }

        div.onclick = ()=>{
            if(booked) return;

            if(selected.includes(i)){
                selected = selected.filter(x => x !== i);
            }else{
                selected.push(i);
            }

            render();
            updateTotal();
        };

        box.appendChild(div);
    }
}

// ===== TÍNH TIỀN =====
function updateTotal(){
    let total = 0;

    selected.forEach(i=>{
        total += (i%5===0)?100000:70000;
    });

    document.getElementById("total").innerText = "Tổng tiền: " + total + "đ";
    document.getElementById("seatList").innerText = selected.join(", ") || "Chưa chọn";
}

function loadSeats(){

    let safeMovie = movie.replace(/[.#$/[\]]/g, "_");
    const currentTime = document.getElementById("timeSelect").value;

    // 🔥 TẮT LISTENER CŨ
    if(seatRef){
        seatRef.off();
    }

    // 🔥 GÁN REF MỚI
    seatRef = db.ref("seats/" + safeMovie + "/" + today + "/" + currentTime);

    seatRef.on("value", snapshot => {

        let data = snapshot.val();

        if(!data){
            bookedSeats = {};
        }else if(Array.isArray(data)){
            bookedSeats = {};
            data.forEach(i => bookedSeats[i] = true);
        }else{
            bookedSeats = data;
        }

        selected = selected.filter(seat => !bookedSeats[seat] && !bookedSeats[seat.toString()]);

        updateTotal();
        render();
    });
}
function changeTime(){
    time = document.getElementById("timeSelect").value;
    selected = [];

    document.getElementById("qrBox").style.display = "none";

    updateTitle();
    loadSeats();
}
function autoResetSeats(){

    let now = new Date();

    const times = ["09:00","13:00","18:00","21:00"];

    times.forEach(t=>{

        let show = new Date(today + "T" + t);

        // chỉ reset khi quá suất chiếu 2 tiếng
        let diff = now - show;

       if(diff > 2 * 60 * 60 * 1000){

    let safeMovie = movie.replace(/[.#$/[\]]/g, "_");
    let ref = db.ref(`seats/${safeMovie}/${today}/${t}`);

    ref.once("value", snap=>{
        let data = snap.val();

        // chỉ xóa nếu KHÔNG có ai đặt
        if(!data || Object.keys(data).length === 0){
            ref.remove();
            console.log("Reset ghế:", t);
        }
    });
}

    });

}


function showQR(){

    if(selected.length === 0){
        alert("Chọn ghế trước");
        return;
    }

    let username = document.getElementById("username").value;
    let payment = document.getElementById("payment").value;

   if(!username.trim()){
    alert("Nhập tên!");
    return;
}
    // Nếu tiền mặt thì đặt luôn
    if(payment === "Tiền mặt"){
        book();
        return;
    }

    // Nếu chuyển khoản thì hiện QR
    let content = movie + "-" + selected.join("-");

    document.getElementById("transferContent").innerText = content;
    document.getElementById("qrBox").style.display = "block";
}
function confirmPaid(){
    const btn = document.querySelector("#qrBox button");

    btn.disabled = true;
    btn.innerText = "Đang xử lý...";

    book();
}
// ===== START =====
updateTitle();

// 🔥 THÊM DÒNG NÀY NGAY ĐÂY
document.getElementById("timeSelect").value = time;

updateTotal();
autoResetSeats();
loadSeats();
setInterval(autoResetSeats,60000);
function booking(){

    // 🔥 check login chuẩn
    const user = firebase.auth().currentUser;
    if(!user){
        alert("Bạn chưa đăng nhập!");
        return;
    }

    if(selected.length === 0){
        alert("Chọn ghế trước");
        return;
    }

    let username = document.getElementById("username").value;

    if(!username.trim()){
        alert("Nhập tên!");
        return;
    }

    let safeMovie = movie.replace(/[.#$/[\]]/g, "_");
    let currentTime = document.getElementById("timeSelect").value;

    let ref = db.ref("seats/" + safeMovie + "/" + today + "/" + currentTime);

    let seatsToBook = [...selected]; // clone tránh lỗi async

    ref.transaction(current => {

        if(current === null) current = {};

        // 🚫 nếu ghế đã có người đặt → HỦY
        for(let seat of seatsToBook){
            if(current[seat] || current[seat.toString()]){
                return null; // 🔥 bắt buộc
            }
        }

        // ✅ tạo data mới
        let newData = {...current};

        seatsToBook.forEach(seat=>{
            newData[seat] = {
                user: user.uid,
                name: username,
                time: new Date().toISOString()
            };
        });

        return newData;

    }, (error, committed, snapshot) => {

        console.log("ERROR:", error);
        console.log("COMMITTED:", committed);
        console.log("DATA:", snapshot?.val());

        if(error){
            alert("Lỗi hệ thống!");
            return;
        }

        if(!committed){
            alert("Ghế vừa bị người khác đặt!");
            return;
        }

        // 🎟 lưu ticket
        let promises = [];

        seatsToBook.forEach(seat=>{
            let p = db.ref("tickets").push({
                user: user.uid,
                userName: username,
                movie: movie,
                seat: seat,
                time: currentTime,
                date: today
            });
            promises.push(p);
        });

        Promise.all(promises).then(()=>{

            alert("🎉 Đặt vé thành công!");

            // 🔥 update UI ngay (không cần chờ firebase)
            seatsToBook.forEach(seat=>{
                bookedSeats[seat] = true;
            });

            selected = [];
            document.getElementById("qrBox").style.display = "none";

            updateTotal();
            render();

        });

    });
}
</script>
