<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trang cá nhân</title>

<link href="css/sb-admin-2.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#4e73df,#1cc88a);
    min-height:100vh;
}

.profile-card{
    max-width:650px;
    margin:60px auto;
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    text-align:center;
    position:relative;
}

.avatar{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #4e73df;
    margin-top:-80px;
    background:white;
}

.header{
    height:120px;
    background:linear-gradient(45deg,#4e73df,#1cc88a);
    border-radius:15px 15px 0 0;
    margin:-30px -30px 0 -30px;
}

.info{
    margin-top:20px;
    text-align:left;
}

.info-item{
    display:flex;
    justify-content:space-between;
    padding:10px 15px;
    border-radius:8px;
    background:#f8f9fc;
    margin-bottom:10px;
}

.label{
    font-weight:bold;
    color:#4e73df;
}

.value{
    color:#333;
}

#editBox{
    margin-top:15px;
    text-align:left;
}

input{
    border-radius:8px;
    border:1px solid #ddd;
    padding:10px;
}

.btn{
    margin-top:10px;
    border-radius:8px;
}

.btn-primary{
    background:#4e73df;
    border:none;
}

.btn-danger{
    background:#e74a3b;
    border:none;
}

.btn-success{
    background:#1cc88a;
    border:none;
}
</style>
</head>

<body>

<div class="profile-card">

    <img id="avatar" class="avatar" src="https://i.imgur.com/6VBx3io.png">

    <h3 id="name">Tên</h3>
    <p id="email">Email</p>

    <div class="info">
        <p><b>📱 SĐT:</b> <span id="phone">---</span></p>
        <p><b>🎂 Năm sinh:</b> <span id="birth">---</span></p>
        <p><b>📍 Địa chỉ:</b> <span id="address">---</span></p>
    </div>

    <!-- FORM EDIT -->
    <div id="editBox" style="display:none;">
        <input id="editName" placeholder="Tên">
        <input id="editPhone" placeholder="SĐT">
        <input id="editBirth" placeholder="Năm sinh">
        <input id="editAddress" placeholder="Địa chỉ">
        <input id="editAvatar" placeholder="Link ảnh">

        <button class="btn btn-success" onclick="saveProfile()">Lưu</button>
    </div>

    <button class="btn btn-primary" onclick="showEdit()">Chỉnh sửa</button>
    <button class="btn btn-danger" onclick="logout()">Đăng xuất</button>
    <button class="btn btn-secondary btn-block" onclick="goHome()">🏠 Thoát</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyB-tw2lNCrv2AXA5mUP4bkp9vzDpLzXqe4",
    authDomain: "movie-booking-87997.firebaseapp.com",
    databaseURL: "https://movie-booking-87997-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "movie-booking-87997",
};
firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let currentUser = null;

// LOAD USER
firebase.auth().onAuthStateChanged(user=>{
    if(user){
        currentUser = user;

        document.getElementById("email").innerText = user.email;

        db.ref("users/" + user.uid).once("value")
        .then(snapshot=>{
            let data = snapshot.val() || {};

            document.getElementById("name").innerText = data.name || "User";
            document.getElementById("phone").innerText = data.phone || "---";
            document.getElementById("birth").innerText = data.birth || "---";
            document.getElementById("address").innerText = data.address || "---";

            if(data.avatar){
                document.getElementById("avatar").src = data.avatar;
            }

            // đổ vào form edit
            document.getElementById("editName").value = data.name || "";
            document.getElementById("editPhone").value = data.phone || "";
            document.getElementById("editBirth").value = data.birth || "";
            document.getElementById("editAddress").value = data.address || "";
            document.getElementById("editAvatar").value = data.avatar || "";
        });

    }else{
        window.location.href = "login.html";
    }
});

// HIỆN FORM
function showEdit(){
    document.getElementById("editBox").style.display = "block";
}

// LƯU
function saveProfile(){
    let data = {
        name: document.getElementById("editName").value,
        phone: document.getElementById("editPhone").value,
        birth: document.getElementById("editBirth").value,
        address: document.getElementById("editAddress").value,
        avatar: document.getElementById("editAvatar").value
    };

    db.ref("users/" + currentUser.uid).set(data)
    .then(()=>{
        alert("Lưu thành công 😎");
        location.reload();
    });
}

// LOGOUT
function logout(){
    firebase.auth().signOut().then(()=>{
        window.location.href = "login.html";
    });
}
function goHome(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
