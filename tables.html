<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng quản lý phim</title>

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="js/js/firebase-config.js"></script>
 <link href="css/tables.css" rel="stylesheet">
</head>

<body>

<div class="header">Quản lý phim rạp</div>

<button class="back-btn" onclick="goBack()">⬅️ Trở về</button>

<div class="table-box">
<table id="movieTable" class="display">
<thead>
<tr>
<th>ID</th>
<th>Tên phim</th>
<th>Thể loại</th>
<th>Thời lượng</th>
<th>Giá vé</th>
<th>Vé đã bán</th>
<th>Doanh thu</th>
</tr>
</thead>
<tbody id="movieData"></tbody>
</table>
</div>

<script>
const db = window.db;
const auth = window.auth;

console.log("DB =", db);
console.log("AUTH =", auth);
let isAdmin = false;

auth.onAuthStateChanged(user => {
    if(!user){
        alert("Chưa đăng nhập!");
        window.location.href = "login.html";
    } else {
        loadData(); 
    }
});

// BACK BUTTON
function goBack(){
    window.location.href="index.html";
}

// LOAD DATA (chỉ dùng tickets)
function loadData(){

    db.ref("tickets").once("value", snap => {
    
        let tickets = snap.val() || {};
        let movieMap = {};
        let html = "";
        let i = 1;

        // Gom dữ liệu theo phim
        for(let t in tickets){
            let movie = tickets[t].movie || "Không rõ";
            let price = tickets[t].price || 0;

            if(!movieMap[movie]){
                movieMap[movie] = { sold:0, revenue:0 };
            }

            movieMap[movie].sold++;
            movieMap[movie].revenue += price;
        }

        // Render table
        for(let m in movieMap){
            html += `
            <tr>
                <td>${i++}</td>
                <td>${m}</td>
                <td>-</td>
                <td>-</td>
                <td>-</td>
                <td>${movieMap[m].sold}</td>
                <td>${movieMap[m].revenue.toLocaleString()}đ</td>
            </tr>
            `;
        }

        document.getElementById("movieData").innerHTML = html;

        // DataTable
        if($.fn.DataTable.isDataTable('#movieTable')){
            $('#movieTable').DataTable().destroy();
        }

        $('#movieTable').DataTable({
            pageLength:5,
            language:{
                url:"https://cdn.datatables.net/plug-ins/1.13.6/i18n/vi.json"
            }
        });

    });
}

// INIT
</script>

</body>
</html>
