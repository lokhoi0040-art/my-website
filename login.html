<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>SB Admin 2 - Login</title>

    <!-- Fonts & Styles -->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900"
        rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <style>

.register-popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
    z-index:999;
}
body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

</style>
</head>

<body class="bg-gradient-primary">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-xl-10 col-lg-12 col-md-9">

                <div class="card o-hidden border-0 shadow-lg my-5">

                    <div class="card-body p-0">

                        <div class="row">

                            <div class="col-lg-6 d-none d-lg-block bg-login-image"></div>

                            <div class="col-lg-6">

                                <div class="p-5">

                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4">
                                            Welcome Back!
                                        </h1>
                                    </div>

                                    <!-- FORM LOGIN -->
                                    <form class="user" onsubmit="return false;">

                                        <div class="form-group">
                                            <input
                                                type="email"
                                                id="exampleInputEmail"
                                                class="form-control form-control-user"
                                                placeholder="📧 Nhập email..."
                                                required
                                            >
                                        </div>

                                        <div class="form-group">
                                            <input
                                                type="password"
                                                id="exampleInputPassword"
                                                class="form-control form-control-user"
                                                placeholder="🔒 Nhập mật khẩu..."
                                                required
                                            >
                                        </div>

                                        <div class="form-group">
                                            <div class="custom-control custom-checkbox small">

                                                <input
                                                    type="checkbox"
                                                    class="custom-control-input"
                                                    id="customCheck"
                                                >

                                                <label
                                                    class="custom-control-label"
                                                    for="customCheck"
                                                >
                                                    Remember Me
                                                </label>

                                            </div>
                                        </div>

                                        <div class="form-group">

                                            <button
                                                type="button"
                                                onclick="login()"
                                                class="btn btn-primary btn-user btn-block"
                                            >
                                                🎬 Đăng nhập
                                            </button>

                                            <button
                                                type="button"
                                               onclick="openRegister()"
                                                class="btn btn-success btn-user btn-block"
                                            >
                                                ➕ Tạo tài khoản
                                            </button>

                                        </div>

                                    </form>

                                    <hr>

                                    <!-- FORM REGISTER -->
                                    <div id="registerForm" class="register-popup">

                                        <div class="form-group">
                                            <input
                                                type="email"
                                                id="registerEmail"
                                                class="form-control form-control-user"
                                                placeholder="📧 Nhập email mới..."
                                            >
                                        </div>

                                        <div class="form-group">
                                            <input
                                                type="password"
                                                id="registerPassword"
                                                class="form-control form-control-user"
                                                placeholder="🔒 Nhập mật khẩu mới..."
                                            >
                                        </div>

                                        <button
                                            onclick="createAccount()"
                                            class="btn btn-success btn-user btn-block"
                                        >
                                            ✔ Tạo tài khoản
                                        </button>

                                    </div>

                                    <hr>

                                    <!-- LINKS -->
                                    <div class="text-center">
                                        <a class="small" href="forgot-password.html">
                                            Forgot Password?
                                        </a>
                                    </div>

                                    <div class="text-center">
                                        <a class="small" href="register.html">
                                            Create an Account!
                                        </a>
                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

    <!-- Scripts -->
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>
    <script src="js/sb-admin-2.min.js"></script>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB-tw2lNCrv2AXA5mUP4bkp9vzDpLzXqe4",
            authDomain: "movie-booking-87997.firebaseapp.com",
            projectId: "movie-booking-87997",
            storageBucket: "movie-booking-87997.appspot.com",
            messagingSenderId: "490389622658",
            appId: "1:490389622658:web:6f9da85f9330207e34099b",
            measurementId: "G-DYPD980LLZ"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Demo login/register functions
      function login() {
    const email = document.getElementById("exampleInputEmail").value;
    const password = document.getElementById("exampleInputPassword").value;

    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.SESSION)
    .then(() => {
        return auth.signInWithEmailAndPassword(email, password);
    })
    .then(() => {
        alert("Đăng nhập thành công!");
        window.location.href = "index.html";
    })
    .catch((error) => {
        alert(error.message);
    });
}

function register() {
    const email = document.getElementById("exampleInputEmail").value;
    const password = document.getElementById("exampleInputPassword").value;

    auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {

            let uid = userCredential.user.uid;

            // 🔥 LƯU USER VÀ ROLE
            firebase.database().ref("users/" + uid).set({
                email: email,
                role: "User" // mặc định
            });

           alert("Tạo tài khoản thành công!");
document.getElementById("registerForm").style.display = "none";
            window.location.href = "index.html";
        })
        .catch((error) => {
            alert(error.message);
        });
}
        
    </script>
    <script>
function loginGoogle(){
    const provider = new firebase.auth.GoogleAuthProvider();

    provider.setCustomParameters({
        prompt: "select_account"
    });

    auth.signInWithPopup(provider)
        .then(() => {
            alert("Đăng nhập Google thành công!");
            window.location.href = "index.html";
        })
        .catch((error) => {
            alert(error.message);
        });
}

function loginFacebook(){
    const provider = new firebase.auth.FacebookAuthProvider();

    auth.signInWithPopup(provider)
        .then((result) => {
            alert("Đăng nhập Facebook thành công!");
            window.location.href = "index.html";
        })
        .catch((error) => {
            alert(error.message);
        });
}
function showRegister(){
    document.getElementById("registerForm").style.display = "block";
}

function createAccount(){

    const email = document.getElementById("registerEmail").value;
    const password = document.getElementById("registerPassword").value;

    if(email === "" || password === ""){
        alert("Vui lòng nhập email và mật khẩu");
        return;
    }

    auth.createUserWithEmailAndPassword(email, password)
    .then((userCredential)=>{

        let uid = userCredential.user.uid;

        firebase.database().ref("users/" + uid).set({
            email: email,
            role: "User"
        });

        alert("Tạo tài khoản thành công!");

        // 🔥 ẨN POPUP
        document.getElementById("registerForm").style.display="none";

    })
    .catch((error)=>{
        alert(error.message);
    });

}
function openRegister(){
    document.getElementById("registerForm").style.display="block";
}
function closeRegister(){
    document.getElementById("registerPopup").style.display="none";
}
</script>
</body>
</html>
