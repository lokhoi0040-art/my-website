<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyB-tw2lNCrv2AXA5mUP4bkp9vzDpLzXqe4",
  authDomain: "movie-booking-87997.firebaseapp.com",
  databaseURL: "https://movie-booking-87997-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "movie-booking-87997",
  storageBucket: "movie-booking-87997.firebasestorage.app",
  messagingSenderId: "490389622658",
  appId: "1:490389622658:web:6f9da85f9330207e34099b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentUser = null;

firebase.auth().onAuthStateChanged(user => {
    if(user){
        currentUser = user;
        console.log("✅ Đã đăng nhập:", user.uid);
    }else{
        currentUser = null;
        console.log("❌ Chưa đăng nhập");
    }
});
// ===== BIẾN =====
let selected = [];
let bookedSeats = {}; // 🔥 LUÔN LÀ OBJECT
let today = new Date().toISOString().split("T")[0];
// ===== LẤY PARAM =====
const params = new URLSearchParams(window.location.search);
const movie = params.get("movie") || "Đặt vé";
let time = params.get("time") || "09:00";

// HIỂN THỊ
function updateTitle(){
    document.getElementById("movieName").innerText = " " + movie + " - " + time;
    document.getElementById("movieName2").innerText = movie + " (" + time + ")";
}

// ===== LOAD GHẾ =====
function loadSeats(){

    let ref = db.ref("seats/" + movie + "/" + today + "/" + time);
    ref.off(); // tránh load trùng

    ref.on("value", snapshot => {

        let data = snapshot.val();

        // 🔥 CHỐNG NULL + CHUẨN HOÁ DATA
        if(!data){
            bookedSeats = {};
        }else if(Array.isArray(data)){
            // nếu lỡ lưu array → convert sang object
            bookedSeats = {};
            data.forEach(i => bookedSeats[i] = true);
        }else{
            bookedSeats = data;
        }

        console.log("DATA:", bookedSeats); // debug

        render();
    });
}

// ===== RENDER GHẾ =====
function render(){
    const box = document.getElementById("seatContainer");
    box.innerHTML = "";

    for(let i=1;i<=30;i++){
        let div = document.createElement("div");
        div.innerText = i;
        div.className = "seat";

        let vip = (i % 5 === 0);
        let booked = bookedSeats[i]; // 🔥 KEY CHUẨN

        if(booked){
            div.classList.add("booked");
        }else if(selected.includes(i)){
            div.classList.add("selected");
        }else if(vip){
            div.classList.add("vip");
        }else{
            div.classList.add("normal");
        }

        div.onclick = ()=>{
            if(booked) return;

            if(selected.includes(i)){
                selected = selected.filter(x => x !== i);
            }else{
                selected.push(i);
            }

            render();
            updateTotal();
        };

        box.appendChild(div);
    }
}

// ===== TÍNH TIỀN =====
function updateTotal(){
    let total = 0;

    selected.forEach(i=>{
        total += (i%5===0)?100000:70000;
    });

    document.getElementById("total").innerText = "Tổng tiền: " + total + "đ";
    document.getElementById("seatList").innerText = selected.join(", ") || "Chưa chọn";
}

// ===== BOOK GHẾ (ANTI TRÙNG) =====
function book(){

    if(selected.length === 0){
        alert("Chọn ghế đi 😅");
        return;
    }

    if(!currentUser){
        alert("Bạn chưa đăng nhập!");
        return;
    }

    let username = document.getElementById("username").value;
    let payment = document.getElementById("payment").value;

    if(!username){
        alert("Nhập tên!");
        return;
    }

    let ref = db.ref(`seats/${movie}/${today}/${time}`);
    let conflict = false;

    ref.transaction(currentData => {

        currentData = currentData || {};

        for(let seat of selected){
            if(currentData[seat]){
                conflict = true;
                return;
            }
        }

        selected.forEach(seat=>{
            currentData[seat] = true;
        });

        return currentData;

    }, (error, committed) => {

        if(error){
            console.error(error);
            alert("Lỗi hệ thống!");
            return;
        }

        if(conflict){
            alert("Ghế vừa bị người khác đặt 😭");
            return;
        }

        if(committed){

            let promises = [];

            selected.forEach(seat=>{
                let p = db.ref("tickets").push({
                    user: currentUser.uid, // 🔥 FIX
                    userName: username,
                    movie: movie,
                    seat: "Ghế " + seat,
                    price: (seat%5===0)?100000:70000,
                    payment: payment,
                    status: "Đã thanh toán"
                });
                promises.push(p);
            });

            Promise.all(promises).then(()=>{
                alert("🎉 Đặt vé thành công!");

                selected = [];
                updateTotal();
                loadSeats();

                window.location.href = "tickets.html";
            });
        }

    });
}

// ===== ĐỔI GIỜ =====
function changeTime(){
    time = document.getElementById("timeSelect").value;
    selected = [];

    updateTitle();
    loadSeats();
}
function bookTicket(movie, seat, price){
    let user = firebase.auth().currentUser?.email || "Khách";

    db.ref("tickets").push({
        user: user,
        movie: movie,
        seat: seat,
        price: price,
        status: "Chờ xác nhận"
    });

    alert("Đặt vé thành công!");
}
function autoResetSeats(){

    let now = new Date();

    const times = ["09:00","13:00","18:00","21:00"];

    times.forEach(t=>{

        let show = new Date(today + "T" + t);

        // chỉ reset khi quá suất chiếu 2 tiếng
        let diff = now - show;

        if(diff > 2 * 60 * 60 * 1000){

            let ref = db.ref(`seats/${movie}/${today}/${t}`);
            ref.remove();

            console.log("Reset ghế suất:", t);

        }

    });

}


function showQR(){

    if(selected.length === 0){
        alert("Chọn ghế trước");
        return;
    }

    let username = document.getElementById("username").value;
    let payment = document.getElementById("payment").value;

    if(!username){
        alert("Nhập tên!");
        return;
    }

    // Nếu tiền mặt thì đặt luôn
    if(payment === "Tiền mặt"){
        book();
        return;
    }

    // Nếu chuyển khoản thì hiện QR
    let content = movie + "-" + selected.join("-");

    document.getElementById("transferContent").innerText = content;
    document.getElementById("qrBox").style.display = "block";
}
function confirmPaid(){
    book();
}
// ===== START =====
updateTitle();
updateTotal();
loadSeats();
autoResetSeats();
setInterval(autoResetSeats,60000);
</script>
