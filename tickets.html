<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="js/js/firebase-config.js"></script>

<script>
const db = window.db;
const auth = window.auth;

console.log("DB =", db);
console.log("AUTH =", auth);
let isAdmin = false;


// ===== LOAD DATA =====
function loadTickets(){
    db.ref("tickets").on("value", snapshot=>{
        let data = snapshot.val();
        let html = "";
        console.log("DATA:", data);
        if(data){
            for(let id in data){
                let t = data[id];

                let badge = "secondary";
                if(t.status === "Chờ xác nhận") badge = "warning";
                if(t.status === "Đã thanh toán") badge = "success";
                if(t.status === "Đã check-in") badge = "primary";

                html += `
                <tr>
                    <td>${t.userName || t.user}</td>
                    <td>${t.movie}</td>
                    <td>${t.seat}</td>
                   <td>${(t.price || 0).toLocaleString()}đ</td>
                    <td>
                        <span class="badge badge-${badge}">
                            ${t.status}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-success btn-sm"
                            onclick="confirmTicket('${id}')">
                            ✔ Xác nhận
                        </button>

                        <button class="btn btn-info btn-sm"
                            onclick="checkIn('${id}')">
                            🎫 Check-in
                        </button>

                        <button class="btn btn-danger btn-sm"
                            onclick="deleteTicket('${id}')">
                            🗑 Xoá
                        </button>
                    </td>
                </tr>
                `;
            }
        }

        document.getElementById("ticketList").innerHTML = html;
    });
}

// ===== THÊM VÉ =====
function addTicket(user, movie, seat, price){
    db.ref("tickets").push({
        user: user,
        movie: movie,
        seat: seat,
        price: price,
        status: "Chờ xác nhận"
    });
}

// ===== XÁC NHẬN =====
function confirmTicket(id){
    db.ref("tickets/" + id).update({
        status: "Đã thanh toán"
    });
}

// ===== CHECK-IN =====
function checkIn(id){
    db.ref("tickets/" + id).once("value", snap=>{
        let t = snap.val();

        if(t.status !== "Đã thanh toán"){
            alert("Phải thanh toán trước!");
            return;
        }

        db.ref("tickets/" + id).update({
            status: "Đã check-in"
        });
    });
}

// ===== XOÁ =====
function deleteTicket(id){
    if(confirm("Xoá vé này?")){
        db.ref("tickets/" + id).remove();
    }
}

// ===== INIT =====

auth.onAuthStateChanged(user => {
    if (!user) {
        alert("Phải đăng nhập!");
        window.location.href = "login.html";
    } else {
        db.ref("users/" + user.uid).once("value").then(snap => {
            let data = snap.val();

            if(data?.role !== "Admin"){
                alert("Không có quyền!");
                window.location.href = "index.html";
            } else {
                loadTickets();
            }
        });
    }
});
firebase.auth().onAuthStateChanged(user=>{
    if(user){
        console.log("UID:", user.uid);
    }
});

</script>
