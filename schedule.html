<!-- ===== SCRIPT ===== -->
<script>
const db = window.db;
const auth = window.auth;

console.log("DB =", db);
console.log("AUTH =", auth);
let isAdmin = false;

auth.onAuthStateChanged(user => {
    if(user){
        db.ref("users/" + user.uid).once("value").then(snap => {
            let data = snap.val();

            if(data && data.role === "Admin"){
                isAdmin = true;
            }

            console.log("isAdmin =", isAdmin);

            loadMovies();
            render();
        });
    } else {
        loadMovies();
        render();
    }
});


// ===== LOAD PHIM
function loadMovies(){
    db.ref("movies").on("value", snapshot=>{
        let data = snapshot.val();
        let html = "<option value=''>-- Chọn phim --</option>";

        if(data){
            for(let id in data){
                html += `<option value="${data[id].name}">${data[id].name}</option>`;
            }
        }

        document.getElementById("movie").innerHTML = html;
    });
}


// ===== THÊM LỊCH
function addSchedule(){

    if(!isAdmin){
        alert("Bạn chỉ được xem!");
        return;
    }

    let m = document.getElementById("movie").value;
    let d = document.getElementById("date").value;
    let t = document.getElementById("time").value;

    if(!m || !d || !t){
        alert("Nhập thiếu 😅");
        return;
    }

    db.ref("schedules").push({
        movie: m,
        date: d,
        time: t
    });
}


// ===== HIỂN THỊ
function render(){
    db.ref("schedules").on("value", snapshot=>{
        let data = snapshot.val();
        let html = "";

        if(data){
            for(let id in data){
                let s = data[id];

                html += `
                <tr>
                    <td><b>${s.movie}</b></td>
                    <td>${s.date}</td>
                    <td>${s.time}</td>
                    <td><span class="badge badge-success">Đang chiếu</span></td>
                    <td>
                        ${
                            isAdmin
                            ? `<button class="btn btn-danger btn-sm" onclick="deleteItem('${id}')">Xoá</button>`
                            : `<span class="text-muted">Chỉ xem</span>`
                        }
                    </td>
                </tr>
                `;
            }
        }

        document.getElementById("scheduleList").innerHTML = html;
    });
}


// ===== XOÁ
function deleteItem(id){

    if(!isAdmin){
        alert("Bạn không có quyền!");
        return;
    }

    if(confirm("Xoá lịch này?")){
        db.ref("schedules/" + id).remove();
    }
}
</script>
