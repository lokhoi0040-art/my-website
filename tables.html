<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng quản lý phim</title>

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f8fafc;
    color:#111;
}
.header{
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}
.back-btn{
    margin-left:20px;
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}
.back-btn:hover{
    background:#1d4ed8;
}
.table-box{
    margin:20px;
    padding:20px;
    background:white;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
table.dataTable thead{
    background:#f1f5f9;
}
table.dataTable tbody tr:hover{
    background:#f1f5f9;
}
</style>
</head>

<body>

<div class="header">Quản lý phim rạp</div>

<button class="back-btn" onclick="goBack()">⬅️ Trở về</button>

<div class="table-box">
<table id="movieTable" class="display">
<thead>
<tr>
<th>ID</th>
<th>Tên phim</th>
<th>Thể loại</th>
<th>Thời lượng</th>
<th>Giá vé</th>
<th>Vé đã bán</th>
<th>Doanh thu</th>
</tr>
</thead>
<tbody id="movieData"></tbody>
</table>
</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB-tw2lNCrv2AXA5mUP4bkp9vzDpLzXqe4",
  authDomain: "movie-booking-87997.firebaseapp.com",
  databaseURL: "https://movie-booking-87997-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "movie-booking-87997",
  storageBucket: "movie-booking-87997.firebasestorage.app",
  messagingSenderId: "490389622658",
  appId: "1:490389622658:web:6f9da85f9330207e34099b"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

// 🔒 CHECK LOGIN
firebase.auth().onAuthStateChanged(user => {
    if(!user){
        alert("Chưa đăng nhập!");
        window.location.href = "login.html";
    } else {
        loadData(); // 🔥 THÊM DÒNG NÀY
    }
});

// BACK BUTTON
function goBack(){
    window.location.href="index.html";
}

// LOAD DATA (chỉ dùng tickets)
function loadData(){

    db.ref("tickets").once("value", snap => {
    
        let tickets = snap.val() || {};
        let movieMap = {};
        let html = "";
        let i = 1;

        // Gom dữ liệu theo phim
        for(let t in tickets){
            let movie = tickets[t].movie || "Không rõ";
            let price = tickets[t].price || 0;

            if(!movieMap[movie]){
                movieMap[movie] = { sold:0, revenue:0 };
            }

            movieMap[movie].sold++;
            movieMap[movie].revenue += price;
        }

        // Render table
        for(let m in movieMap){
            html += `
            <tr>
                <td>${i++}</td>
                <td>${m}</td>
                <td>-</td>
                <td>-</td>
                <td>-</td>
                <td>${movieMap[m].sold}</td>
                <td>${movieMap[m].revenue.toLocaleString()}đ</td>
            </tr>
            `;
        }

        document.getElementById("movieData").innerHTML = html;

        // DataTable
        if($.fn.DataTable.isDataTable('#movieTable')){
            $('#movieTable').DataTable().destroy();
        }

        $('#movieTable').DataTable({
            pageLength:5,
            language:{
                url:"https://cdn.datatables.net/plug-ins/1.13.6/i18n/vi.json"
            }
        });

    });
}

// INIT
</script>

</body>
</html>
